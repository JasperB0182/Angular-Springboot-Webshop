<article class="product-overview-card" [routerLink]="['/products/alles/', productId]">
  <img src="{{ productimg }}" height="120px" width="120px">
  <p id="product-overview-naam">{{ productnaam }}</p>

  <p id="product-prijs">€{{ productprijs }}</p>

  <img id="product-brand-img" src="{{ productbrandimg }}" height="100" width="100">

  <p id="product-overview-beschrijving">{{ productBeschrijving }}</p>
</article>
