<section id="product-showcase-list-container">

  @if (ShowcaseProducts?.length){
    @for (Showcaseproduct of ShowcaseProducts.slice(0, 6) ; track Showcaseproduct.product_naam){
      <app-product-showcase productnaam="{{Showcaseproduct.product_naam}}" fotolocatie="{{Showcaseproduct.img_product}}"/>
    }
  } @else {
    <p>Loading products..</p>
  }

</section>
