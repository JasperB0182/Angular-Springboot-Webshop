<section id="product-showcase-list-container">

  @if (DummyProducts?.length){
    @for (Dummyproduct of DummyProducts.slice(0, 6) ; track Dummyproduct.product_naam){
      <app-product-showcase productnaam="{{Dummyproduct.product_naam}}" fotolocatie="{{Dummyproduct.img_product}}"/>
    }
  } @else {
    <p>Loading products..</p>
  }

</section>
